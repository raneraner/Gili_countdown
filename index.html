<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כמה זמן נשאר לגילי</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f3f4f6; 
            color: #333; 
            overflow: hidden;
        }
        .container { 
            text-align: center; 
            background: white; 
            padding: 2.5rem; 
            border-radius: 1rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 400px; 
            position: relative;
        }
        #profile-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem auto;
        }
        img#profile-img { 
            width: 140px; 
            height: 140px; 
            border-radius: 50%; 
            object-fit: cover; 
            position: relative; 
            z-index: 2; 
            border: 4px solid #3b82f6;
            background-color: #e5e7eb;
        }
        .emoji-circle {
            position: absolute;
            width: 200px;
            height: 200px;
            left: -30px; 
            top: -30px;
            pointer-events: none; 
            z-index: 1; 
        }
        .emoji {
            font-size: 1.5rem;
            position: absolute;
            transform-origin: center;
        }
        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        h1 { 
            margin-bottom: 1rem; 
            font-size: 1.8rem; 
            color: #111827;
        }
        .timer { 
            font-size: 3.5rem; 
            font-weight: bold; 
            margin: 1.5rem 0; 
            color: #1f2937; 
            font-variant-numeric: tabular-nums;
            direction: ltr;
        }
        .buttons { 
            display: flex; 
            gap: 1rem; 
            justify-content: center; 
            margin-bottom: 1rem;
        }
        button { 
            padding: 0.75rem 2rem; 
            font-size: 1.2rem; 
            font-weight: bold;
            border: none; 
            border-radius: 0.5rem; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .btn-20 { background: #3b82f6; color: white; }
        .btn-21 { background: #10b981; color: white; }
        button:hover { opacity: 0.85; transform: translateY(-2px); }
        #status {
            color: #6b7280;
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="profile-container">
            <img src="gili.jpeg" alt="גילי" id="profile-img" onerror="this.style.display='none'">
            <div id="emojis-orbit" class="emoji-circle"></div>
        </div>
        
        <h1>כמה זמן נשאר לגילי</h1>
        
        <div class="timer" id="display">00:00:00</div>
        
        <div class="buttons">
            <button class="btn-20" onclick="setTarget(20, 0)">20:00</button>
            <button class="btn-21" onclick="setTarget(21, 40)">21:40</button>
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        // ניהול הטיימר
        let targetDate = null;
        let timerInterval = null;

        function setTarget(hours, minutes) {
            const now = new Date();
            targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);

            if (targetDate < now) {
                targetDate.setDate(targetDate.getDate() + 1);
            }

            const minString = minutes === 0 ? '00' : minutes;
            document.getElementById('status').innerText = `יעד נוכחי: ${hours}:${minString}`;
            
            updateTimer();
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (!targetDate) return;
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('display').innerText = "00:00:00";
                document.getElementById('status').innerText = "המשמרת הסתיימה! גילי בדרך הביתה.";
                clearInterval(timerInterval);
                return;
            }

            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            const format = (num) => num.toString().padStart(2, '0');
            document.getElementById('display').innerText = `${format(h)}:${format(m)}:${format(s)}`;
        }

        setTarget(20, 0);

        // הוספת אימוג׳ים מסתובבים בצורה חלקה
        function addOrbingEmojis() {
            const emojis = ['🍱', '🍷', '🏠', '🕶️'];
            const container = document.getElementById('emojis-orbit');
            const numEmojis = emojis.length;
            const orbitRadius = 100;

            for (let i = 0; i < numEmojis; i++) {
                const emojiSpan = document.createElement('span');
                emojiSpan.innerText = emojis[i];
                emojiSpan.classList.add('emoji');
                
                const angle = (360 / numEmojis) * i;
                const radians = angle * (Math.PI / 180);
                const x = orbitRadius + orbitRadius * Math.cos(radians);
                const y = orbitRadius + orbitRadius * Math.sin(radians);
                
                emojiSpan.style.left = `${x}px`;
                emojiSpan.style.top = `${y}px`;

                const duration = 12; // זמן הקפה בשניות
                emojiSpan.style.animation = `orbit ${duration}s linear infinite`;
                emojiSpan.style.transformOrigin = `-${orbitRadius}px -${orbitRadius}px`;
                
                container.appendChild(emojiSpan);
            }
        }

        addOrbingEmojis();
    </script>
</body>
</html>
